# ============================================================
# Silverstone Circuit — 2024 F1 British Grand Prix
# ============================================================
# Source: FIA Circuit Notes 2024, official sector times
# Lap distance: 5.891 km  |  Race: 52 laps  |  ~306.3 km

metadata:
  name: "Silverstone Circuit"
  location: "Silverstone, UK"
  country: "GBR"
  circuit_id: "silverstone"
  fastf1_name: "Silverstone"
  season: 2024
  gp_name: "British Grand Prix"
  race_laps: 52
  lap_distance_km: 5.891
  lap_record:
    time_s: 84.303        # L. Hamilton, Mercedes, 2020
    driver: "L. Hamilton"
    year: 2020
  drs_zones: 2
  fia_grade: 1

# ── Physical / environmental defaults ───────────────────────
environment:
  altitude_m: 153
  ambient_temp_c: 22.0
  track_temp_c: 40.0
  humidity_pct: 55
  typical_wind_speed_ms: 5.0
  air_density_correction: 1.000

# ── Grip / surface ───────────────────────────────────────────
surface:
  asphalt_type: "rough_abrasive"   # hard on fronts through Maggotts/Becketts
  grip_factor: 0.95
  tyre_stress_factor: 1.15         # high front tyre stress (Maggotts/Becketts complex)
  brake_stress_factor: 1.20        # Stowe, Abbey, Brooklands heavy braking
  bump_severity: 0.35

# ── Weather (Level B dynamic) ────────────────────────────────
# Track wetness [0 = dry, 1 = soaked] interpolated per lap.
# Reconstructed from the REAL 2024 British GP timing data (full field):
#   L1-16   dry slicks (~92.5 s)
#   L17-19  rain arriving, slick pace rising to ~104 s
#   L20-26  damp — first cars try inters, most stay on slicks (marginal)
#   L27-28  field crosses over to intermediates (100 % inters from L29)
#   L29-37  fully wet on inters, peak around L33-34 (~104.6 s)
#   L38-39  drying, cars switch back to slicks
#   L40-52  dry slicks again (~90 s)
# Wetness values are mapped to the sim's crossover (slick→inter at ~0.42) so
# the optimiser switches compounds at the same laps the real field did.
# Override with --wetness 0 for a dry counterfactual, or --weather-timeline.
weather:
  timeline:
    - {lap:  1, wetness: 0.00}
    - {lap: 16, wetness: 0.00}
    - {lap: 19, wetness: 0.15}
    - {lap: 26, wetness: 0.40}
    - {lap: 28, wetness: 0.56}
    - {lap: 33, wetness: 0.62}
    - {lap: 37, wetness: 0.50}
    - {lap: 39, wetness: 0.40}
    - {lap: 41, wetness: 0.00}
    - {lap: 52, wetness: 0.00}

# ── Sectors ─────────────────────────────────────────────────
# Three official F1 sectors.
# ref_lap_time_s is the 2024 pole baseline (Norris, 1:25.857 = 85.857 s)
sectors:
  - id: 1
    name: "Abbey – Copse"
    distance_m: 2100
    ref_time_s: 28.8
    avg_speed_kph: 262
    max_speed_kph: 315        # Hangar Straight peak
    min_speed_kph: 95         # Luffield hairpin apex
    type: "mixed"
    drs: true
    overtaking_likelihood: 0.55
    notes: "DRS into Abbey; Village/Loop chicane complex; Wellington straight; Brooklands"

  - id: 2
    name: "Copse – Stowe"
    distance_m: 1950
    ref_time_s: 35.1
    avg_speed_kph: 200
    max_speed_kph: 315        # Hangar Straight
    min_speed_kph: 165        # Copse chicane
    type: "high_speed"
    drs: false
    overtaking_likelihood: 0.15
    notes: "Copse chicane; Maggotts high-speed left (4.5g); Becketts S-curves (4.8g); Hangar Straight"

  - id: 3
    name: "Stowe – Start/Finish"
    distance_m: 1841
    ref_time_s: 21.9
    avg_speed_kph: 302
    max_speed_kph: 315
    min_speed_kph: 100
    type: "mixed"
    drs: true
    overtaking_likelihood: 0.30
    notes: "Stowe heavy braking; Vale/Club complex; DRS back on National straight"

# ── Mini-sector speed / throttle trace ──────────────────────
# 20 mini-sectors of ~295 m each (5891 m / 20).
# Sectors represent the APEX speed at corners and straight speed elsewhere.
# Maggotts (MS12) is taken FLAT at 4.5g — correctly modelled as straight-through.
# Becketts (MS13) is the apex of the S-curves complex.
mini_sectors:
  #  id  dist_m  speed_kph  throttle  brake  lateral_g  notes
  # lateral_g is calibrated to match observed F1 apex speeds when computed
  # as κ = lateral_g×g/speed² with the Silverstone high-downforce aero setup
  # (lift_coefficient=2.80).  Values are lower than for Monza (lift=2.00)
  # because the extra downforce provides more cornering force at the same speed.
  # heading_change_deg: signed heading variation through the segment.
  #   negative = right turn (clockwise), positive = left turn.
  #   Sum over full lap = -360° (clockwise circuit).
  - {id:  1, dist_m:    0, speed_kph: 295, throttle: 1.00, brake: 0.00, lateral_g: 0.3, turn: straight, heading_change_deg:   0}  # National pits straight
  - {id:  2, dist_m:  294, speed_kph: 280, throttle: 0.90, brake: 0.10, lateral_g: 0.5, turn: straight, heading_change_deg:   0}  # Approaching Abbey
  - {id:  3, dist_m:  588, speed_kph: 105, throttle: 0.12, brake: 0.88, lateral_g: 2.0, turn: right,    heading_change_deg: -85}  # Abbey (destra)
  - {id:  4, dist_m:  882, speed_kph: 155, throttle: 0.55, brake: 0.20, lateral_g: 2.0, turn: left,     heading_change_deg: +15}  # Farm curve (sinistra)
  - {id:  5, dist_m: 1176, speed_kph: 100, throttle: 0.10, brake: 0.88, lateral_g: 1.9, turn: right,    heading_change_deg: -50}  # Village / The Loop (destra)
  - {id:  6, dist_m: 1470, speed_kph: 162, throttle: 0.60, brake: 0.15, lateral_g: 2.5, turn: right,    heading_change_deg: -25}  # Aintree (destra)
  - {id:  7, dist_m: 1764, speed_kph: 278, throttle: 1.00, brake: 0.00, lateral_g: 0.4, turn: straight, heading_change_deg:   0}  # Wellington straight
  - {id:  8, dist_m: 2058, speed_kph: 100, throttle: 0.10, brake: 0.88, lateral_g: 2.0, turn: right,    heading_change_deg: -45}  # Brooklands (destra)
  - {id:  9, dist_m: 2352, speed_kph:  90, throttle: 0.10, brake: 0.45, lateral_g: 1.8, turn: right,    heading_change_deg: -45}  # Luffield hairpin (destra)
  - {id: 10, dist_m: 2646, speed_kph: 215, throttle: 0.88, brake: 0.02, lateral_g: 1.5, turn: right,    heading_change_deg: -20}  # Woodcote / Copse (destra)
  - {id: 11, dist_m: 2940, speed_kph: 165, throttle: 0.40, brake: 0.55, lateral_g: 2.3, turn: right,    heading_change_deg: -20}  # Copse (destra)
  - {id: 12, dist_m: 3234, speed_kph: 260, throttle: 1.00, brake: 0.00, lateral_g: 4.5, turn: left,     heading_change_deg: +60}  # Maggotts (sinistra!)
  - {id: 13, dist_m: 3528, speed_kph: 185, throttle: 0.85, brake: 0.00, lateral_g: 3.2, turn: right,    heading_change_deg: -60}  # Becketts S-curves (destra)
  - {id: 14, dist_m: 3822, speed_kph: 278, throttle: 1.00, brake: 0.00, lateral_g: 1.2, turn: right,    heading_change_deg: -20}  # Chapel exit (destra)
  - {id: 15, dist_m: 4116, speed_kph: 315, throttle: 1.00, brake: 0.00, lateral_g: 0.3, turn: straight, heading_change_deg:   0}  # Hangar Straight
  - {id: 16, dist_m: 4410, speed_kph:  95, throttle: 0.08, brake: 0.92, lateral_g: 1.8, turn: right,    heading_change_deg: -65}  # Stowe (destra)
  - {id: 17, dist_m: 4704, speed_kph: 172, throttle: 0.58, brake: 0.22, lateral_g: 2.2, turn: left,     heading_change_deg: +40}  # Vale (sinistra)
  - {id: 18, dist_m: 4998, speed_kph: 152, throttle: 0.44, brake: 0.28, lateral_g: 2.0, turn: right,    heading_change_deg: -20}  # Club approach (destra)
  - {id: 19, dist_m: 5292, speed_kph: 142, throttle: 0.38, brake: 0.30, lateral_g: 2.0, turn: right,    heading_change_deg: -20}  # Club corner (destra)
  - {id: 20, dist_m: 5586, speed_kph: 295, throttle: 1.00, brake: 0.00, lateral_g: 0.4, turn: straight, heading_change_deg:   0}  # National pits straight run
  # Total heading_change_deg = -360° (verified)

# ── Tyre compounds available ─────────────────────────────────
tyres:
  # Pirelli nominates softer compounds at Silverstone vs Monza.
  # 2024: C3 (Hard), C4 (Medium), C5 (Soft) — labelled as Hard/Medium/Soft.
  available_compounds: ["C3", "C4", "C5"]
  compound_labels: {C3: "Hard", C4: "Medium", C5: "Soft"}

  C3:
    compound: "Hard"
    color_hex: "#FFFFFF"
    delta_s: 1.5
    deg_rate_s_per_lap: 0.065
    wear_limit_laps: 35
    warmup_laps: 4
    optimal_temp_c: 100
    temp_window_c: [85, 115]

  C4:
    compound: "Medium"
    color_hex: "#FFD700"
    delta_s: 0.7
    deg_rate_s_per_lap: 0.105
    wear_limit_laps: 24
    warmup_laps: 3
    optimal_temp_c: 92
    temp_window_c: [78, 108]

  C5:
    compound: "Soft"
    color_hex: "#FF0000"
    delta_s: 0.0
    deg_rate_s_per_lap: 0.165
    wear_limit_laps: 14
    warmup_laps: 2
    optimal_temp_c: 84
    temp_window_c: [70, 100]

# ── Circuit-specific compound overrides (DATA-DRIVEN, ML step 3) ──────
# Degradation overlay set from real FastF1 stints (2019-2024, fuel-corrected).
# The learned slick degradation here is LOW (Soft 0.058, Medium 0.028,
# Hard 0.024 s/lap — cool British conditions, many stints from the wet/mixed
# 2024 race). The physics wear model already produces MORE than this
# (~0.07-0.10), so the additive overlay is clamped to ZERO.
# KNOWN RESIDUAL: with overlay 0 the sim still over-degrades slicks here vs the
# learned rate; the additive overlay cannot reduce degradation. Fully matching
# would need a per-circuit physics wear multiplier (future refinement). Low
# priority: the 2024 Silverstone race is wet, so dry race-pace is not validated.
compound_overrides:
  Hard:   {deg_s_per_lap: 0.0}
  Medium: {deg_s_per_lap: 0.0}
  Soft:   {deg_s_per_lap: 0.0}

# ── Pit stop data ────────────────────────────────────────────
pit_stop:
  pit_lane_delta_s: 24.5    # longer pit lane than Monza
  stationary_time_s: 2.5
  pit_lane_speed_limit_kph: 80
  pit_entry_dist_m: 5650
  unsafe_release_risk: 0.02

# ── Safety car / VSC probabilities (historical Silverstone) ──
safety_car:
  sc_probability_per_lap: 0.045
  vsc_probability_per_lap: 0.030
  avg_sc_duration_laps: 4

# ── Fuel ────────────────────────────────────────────────────
fuel:
  race_fuel_load_kg: 110
  fuel_effect_s_per_kg: 0.035
  consumption_kg_per_lap: 2.12   # ~110 kg / 52 laps

# ── ERS / Power unit ─────────────────────────────────────────
ers:
  deployment_strategy: "full_straight"
  available_per_lap_mj: 4.0
  typical_deploy_mj: 3.6

# ── Circuit-specific vehicle setup ───────────────────────────
# Overrides the base vehicle parameters in main.py for this circuit.
# Silverstone requires more downforce than Monza for the fast sweepers.
vehicle_setup:
  drag_coefficient: 0.83      # higher than Monza (0.75) — medium-high downforce wing
  lift_coefficient: 2.80      # higher than Monza (2.00) — wing for Maggotts/Becketts
  max_speed: 88.0             # 316.8 km/h — Hangar Straight Vmax (capped by aero)
  fuel_mass: 110.0            # heavier fuel load than Monza (105 kg)
  tyre_mu: 1.85               # high-downforce package increases normal force already
                              # via lift_coefficient; without this the sim over-estimates
                              # corner speeds. Recalibrated vs NOR Q pole 85.857 s after the
                              # track-length fix (sim 85.698 s, gap -0.159 s). Was 1.80
                              # before the fix (when the lap geometry was ~3% short).
