# ============================================================
# Marina Bay Street Circuit — 2024 F1 Singapore Grand Prix
# ============================================================
# Source: FastF1 2024 qualifying telemetry (NOR pole 1:29.525) + FIA notes.
# Lap distance: 4.887 km  |  Race: 62 laps  |  ~303.0 km
# 2024 LAYOUT: Turns 16-19 sequence removed vs 2023 → shorter (4.887 km),
# 19 corners, one extra flat-out section. Faster than the old 5.063 km layout.
# Night race — street circuit, walls close, very low avg speed (~197 km/h pole).
# Highest SC probability on the calendar (~1.2 SC/race over 62 laps).
# Softest tyre range (C3/C4/C5): smooth surface but heavy lateral loading.

metadata:
  name: "Marina Bay Street Circuit"
  location: "Singapore"
  country: "SGP"
  circuit_id: "singapore"
  fastf1_name: "Singapore Grand Prix"
  season: 2024
  gp_name: "Singapore Grand Prix"
  race_laps: 62
  lap_distance_km: 4.887
  lap_record:
    time_s: 94.0          # race lap record on 2024 layout (approx)
    driver: "D. Ricciardo"
    year: 2024
  drs_zones: 3
  fia_grade: 1

# ── Physical / environmental defaults ───────────────────────
# Night race: cooler ambient (~28°C), high humidity, track temp lower than daytime.
environment:
  altitude_m: 15
  ambient_temp_c: 28.0
  track_temp_c: 31.0
  humidity_pct: 78
  typical_wind_speed_ms: 2.5
  air_density_correction: 0.998
# ── Grip / surface ───────────────────────────────────────────
surface:
  asphalt_type: "smooth_street"
  grip_factor: 0.88
  tyre_stress_factor: 1.10
  brake_stress_factor: 1.15
  bump_severity: 0.45

# ── Sectors ─────────────────────────────────────────────────
# Three official F1 sectors. distance_m must sum within 50 m of 4887 m.
# ref_lap_time_s: NOR 2024 pole 1:29.525 = 89.525 s
sectors:
  - id: 1
    name: "Start/Finish – Turn 7"
    distance_m: 1620
    ref_time_s: 29.5
    avg_speed_kph: 198
    max_speed_kph: 313
    min_speed_kph: 91
    type: "mixed"
    drs: true
    overtaking_likelihood: 0.35
    notes: "Main straight DRS into T1; T2-3 complex; T5-6 right; DRS straight to T7"

  - id: 2
    name: "Turn 7 – Turn 13"
    distance_m: 1640
    ref_time_s: 31.0
    avg_speed_kph: 190
    max_speed_kph: 289
    min_speed_kph: 65
    type: "technical"
    drs: true
    overtaking_likelihood: 0.25
    notes: "T7-8 slow; T9-10-11 sequence; T13 hairpin (slowest, 65 km/h)"

  - id: 3
    name: "Turn 13 – Start/Finish"
    distance_m: 1627
    ref_time_s: 29.0
    avg_speed_kph: 205
    max_speed_kph: 304
    min_speed_kph: 93
    type: "mixed"
    drs: false
    overtaking_likelihood: 0.15
    notes: "T14 slow; flat-out section (2024 layout); T16-T19 final corners to S/F"

# ── Mini-sector speed / throttle trace ──────────────────────
# 20 mini-sectors of ~244.35 m each (4887 m / 20).
# Rebuilt from REAL 2024 FastF1 qualifying telemetry: speed_kph = real apex
# (per-bin minimum) at corners, real bin maximum at flat-out sections.
# lateral_g assigned by speed class so the derived radius reproduces the real
# apex under the high-downforce package (lift 3.20): slow 1.9-2.0g, medium
# 2.4-2.9g, fast 3.0-3.4g. heading_change_deg is map-only (not physics).
mini_sectors:
  #  id   dist_m  speed_kph  throttle  brake  lateral_g  turn   heading_change_deg  notes
  - {id:  1, dist_m:    0, speed_kph: 300, throttle: 1.00, brake: 0.00, lateral_g: 0.3, turn: straight, heading_change_deg:   0}  # S/F straight (real vmax 306)
  - {id:  2, dist_m:  244, speed_kph: 140, throttle: 0.45, brake: 0.55, lateral_g: 2.8, turn: right,    heading_change_deg: -30}  # T1 braking (real apex 140)
  - {id:  3, dist_m:  489, speed_kph:  91, throttle: 0.20, brake: 0.70, lateral_g: 2.0, turn: left,     heading_change_deg: +30}  # T2-T3 slow (real apex 91)
  - {id:  4, dist_m:  733, speed_kph: 160, throttle: 0.65, brake: 0.15, lateral_g: 3.0, turn: right,    heading_change_deg: -35}  # T4-T5 medium-fast (real apex 160)
  - {id:  5, dist_m:  977, speed_kph: 179, throttle: 0.78, brake: 0.05, lateral_g: 3.3, turn: right,    heading_change_deg: -25}  # T6 fast (real apex 179)
  - {id:  6, dist_m: 1222, speed_kph: 300, throttle: 1.00, brake: 0.00, lateral_g: 0.4, turn: straight, heading_change_deg:   0}  # Straight (real vmin 276)
  - {id:  7, dist_m: 1466, speed_kph: 313, throttle: 1.00, brake: 0.00, lateral_g: 0.4, turn: straight, heading_change_deg:   0}  # DRS straight (real vmax 313)
  - {id:  8, dist_m: 1711, speed_kph:  96, throttle: 0.15, brake: 0.85, lateral_g: 2.0, turn: left,     heading_change_deg: +60}  # T7 slow (heavy braking, apex 96)
  - {id:  9, dist_m: 1955, speed_kph:  81, throttle: 0.12, brake: 0.78, lateral_g: 2.0, turn: right,    heading_change_deg: -65}  # T8 slow (real apex 81)
  - {id: 10, dist_m: 2199, speed_kph: 151, throttle: 0.60, brake: 0.18, lateral_g: 2.9, turn: left,     heading_change_deg: +30}  # T9-T10 medium (apex 151)
  - {id: 11, dist_m: 2444, speed_kph: 148, throttle: 0.58, brake: 0.20, lateral_g: 2.9, turn: right,    heading_change_deg: -30}  # T11 medium (apex 148)
  - {id: 12, dist_m: 2688, speed_kph: 116, throttle: 0.35, brake: 0.50, lateral_g: 2.4, turn: left,     heading_change_deg: +35}  # T12 medium-slow (apex 116)
  - {id: 13, dist_m: 2932, speed_kph:  65, throttle: 0.08, brake: 0.92, lateral_g: 1.9, turn: right,    heading_change_deg: -95}  # T13 hairpin (slowest, apex 65)
  - {id: 14, dist_m: 3177, speed_kph: 287, throttle: 1.00, brake: 0.00, lateral_g: 0.5, turn: straight, heading_change_deg:   0}  # Fast section (real vmin 226)
  - {id: 15, dist_m: 3421, speed_kph:  93, throttle: 0.18, brake: 0.80, lateral_g: 2.0, turn: left,     heading_change_deg: +55}  # T14 slow (apex 93)
  - {id: 16, dist_m: 3665, speed_kph: 274, throttle: 1.00, brake: 0.00, lateral_g: 0.5, turn: straight, heading_change_deg:   0}  # Fast/straight (real vmin 195)
  - {id: 17, dist_m: 3910, speed_kph: 304, throttle: 1.00, brake: 0.00, lateral_g: 0.3, turn: straight, heading_change_deg:   0}  # Straight (real vmin 277)
  - {id: 18, dist_m: 4154, speed_kph: 116, throttle: 0.35, brake: 0.55, lateral_g: 2.4, turn: right,    heading_change_deg: -45}  # T16-T17 medium-slow (apex 116)
  - {id: 19, dist_m: 4399, speed_kph: 180, throttle: 0.78, brake: 0.08, lateral_g: 3.3, turn: left,     heading_change_deg: +20}  # T18 fast (apex 180)
  - {id: 20, dist_m: 4643, speed_kph: 269, throttle: 1.00, brake: 0.00, lateral_g: 0.5, turn: right,    heading_change_deg: -10}  # T19 → S/F straight (real vmin 215)

# ── Tyre compounds available ─────────────────────────────────
tyres:
  # 2024 Singapore: C3 (Hard), C4 (Medium), C5 (Soft) — softest range.
  available_compounds: ["C3", "C4", "C5"]
  compound_labels: {C3: "Hard", C4: "Medium", C5: "Soft"}

  C3:
    compound: "Hard"
    color_hex: "#FFFFFF"
    delta_s: 2.0
    deg_rate_s_per_lap: 0.072
    wear_limit_laps: 35
    warmup_laps: 4
    optimal_temp_c: 100
    temp_window_c: [85, 115]

  C4:
    compound: "Medium"
    color_hex: "#FFD700"
    delta_s: 1.0
    deg_rate_s_per_lap: 0.110
    wear_limit_laps: 25
    warmup_laps: 3
    optimal_temp_c: 92
    temp_window_c: [78, 108]

  C5:
    compound: "Soft"
    color_hex: "#FF0000"
    delta_s: 0.0
    deg_rate_s_per_lap: 0.155
    wear_limit_laps: 15
    warmup_laps: 2
    optimal_temp_c: 85
    temp_window_c: [72, 102]

# ── Circuit-specific compound overrides (data-driven overlay) ──
# Set to 0.0 initially; learned from FastF1 stints in a later step.
compound_overrides:
  Hard:
    deg_s_per_lap: 0.0
  Medium:
    deg_s_per_lap: 0.0
  Soft:
    deg_s_per_lap: 0.0

# ── Pit stop data ────────────────────────────────────────────
pit_stop:
  pit_lane_delta_s: 28.0
  stationary_time_s: 2.5
  pit_lane_speed_limit_kph: 80
  pit_entry_dist_m: 4750
  unsafe_release_risk: 0.03

# ── Safety car / VSC probabilities (refined by sc_history.py) ──
# Singapore is the highest-SC circuit on the calendar.
# FastF1 2019-2024: 7 SC + 3 VSC in 6 races → sc/lap ~0.018.
safety_car:
  sc_probability_per_lap: 0.018
  vsc_probability_per_lap: 0.009
  avg_sc_duration_laps: 6

# ── Fuel ────────────────────────────────────────────────────
fuel:
  race_fuel_load_kg: 110
  fuel_effect_s_per_kg: 0.035
  consumption_kg_per_lap: 1.77   # ~110 kg / 62 laps

# ── ERS / Power unit ─────────────────────────────────────────
ers:
  deployment_strategy: "full_straight"
  available_per_lap_mj: 4.0
  typical_deploy_mj: 3.2

# ── Circuit-specific vehicle setup ───────────────────────────
# Singapore: maximum downforce package on the calendar.
vehicle_setup:
  drag_coefficient: 0.88        # high but real Vmax hits 313 km/h on DRS straight
  lift_coefficient: 3.20        # maximum downforce
  max_speed: 87.0               # ~313 km/h real DRS Vmax
  fuel_mass: 110.0
  tyre_mu: 1.63                 # calibrated vs NOR Q pole 89.525 s (sim 89.562 s, gap +0.037 s)
  ers_power_kw: 0

# ── Weather (2024 Singapore GP was dry) ─────────────────────
weather:
  track_wetness: 0.0
