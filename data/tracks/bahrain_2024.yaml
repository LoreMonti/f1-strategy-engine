# ============================================================
# Bahrain International Circuit — 2024 F1 Bahrain Grand Prix
# ============================================================
# Source: FIA Circuit Notes 2024, official sector times
# Lap distance: 5.412 km  |  Race: 57 laps  |  ~308.5 km
# Season opener (2 March 2024) — night race, dry guaranteed (desert).
# Abrasive asphalt → high tyre degradation (traction/rear-limited).

metadata:
  name: "Bahrain International Circuit"
  location: "Sakhir, Bahrain"
  country: "BHR"
  circuit_id: "bahrain"
  fastf1_name: "Bahrain"
  season: 2024
  gp_name: "Bahrain Grand Prix"
  race_laps: 57
  lap_distance_km: 5.412
  lap_record:
    time_s: 91.447        # P. de la Rosa, McLaren, 2005
    driver: "P. de la Rosa"
    year: 2005
  drs_zones: 3
  fia_grade: 1

# ── Physical / environmental defaults ───────────────────────
# Night race: cooler ambient, but desert track still retains heat.
environment:
  altitude_m: 7
  ambient_temp_c: 20.0
  track_temp_c: 27.0
  humidity_pct: 45
  typical_wind_speed_ms: 4.0
  air_density_correction: 1.000

# ── Grip / surface ───────────────────────────────────────────
surface:
  asphalt_type: "very_rough_abrasive"  # one of the most abrasive on the calendar
  grip_factor: 0.92
  tyre_stress_factor: 1.25             # very high — sand-blasted, traction-limited
  brake_stress_factor: 1.25            # T1, T4, T8, T10, T13/14 heavy braking
  bump_severity: 0.20

# ── Sectors ─────────────────────────────────────────────────
# Three official F1 sectors.
# ref_lap_time_s is the 2024 pole baseline (Verstappen, 1:29.179 = 89.179 s)
sectors:
  - id: 1
    name: "Start/Finish – Turn 4"
    distance_m: 1780
    ref_time_s: 29.6
    avg_speed_kph: 216
    max_speed_kph: 322        # main straight DRS peak
    min_speed_kph: 95         # Turn 1 apex
    type: "mixed"
    drs: true
    overtaking_likelihood: 0.60
    notes: "Main straight DRS into T1 heavy braking; T1-2-3 complex; T4 right"

  - id: 2
    name: "Turn 4 – Turn 10"
    distance_m: 1820
    ref_time_s: 31.2
    avg_speed_kph: 210
    max_speed_kph: 300        # back straight DRS
    min_speed_kph: 85         # T10 apex
    type: "mixed"
    drs: true
    overtaking_likelihood: 0.40
    notes: "T5-6-7 esses; back straight DRS into T8; T9-10 complex"

  - id: 3
    name: "Turn 10 – Start/Finish"
    distance_m: 1812
    ref_time_s: 28.4
    avg_speed_kph: 218
    max_speed_kph: 305
    min_speed_kph: 110
    type: "mixed"
    drs: false
    overtaking_likelihood: 0.20
    notes: "T11-12-13 flowing; T13/14 braking; T15 onto main straight"

# ── Mini-sector speed / throttle trace ──────────────────────
# 20 mini-sectors of ~270.6 m each (5412 m / 20).
# Speeds represent the APEX speed at corners and straight speed elsewhere.
# lateral_g calibrated for the Bahrain medium-downforce aero package
# (lift_coefficient=2.30 — between Monza 2.00 and Silverstone 2.80).
# heading_change_deg: signed heading variation through the segment.
#   negative = right turn (clockwise), positive = left turn.
#   Sum over full lap = -360° (clockwise circuit).
mini_sectors:
  #  id  dist_m  speed_kph  throttle  brake  lateral_g  turn  heading_change_deg  notes
  - {id:  1, dist_m:    0, speed_kph: 320, throttle: 1.00, brake: 0.00, lateral_g: 0.3, turn: straight, heading_change_deg:   0}  # Main straight (S/F)
  - {id:  2, dist_m:  271, speed_kph: 310, throttle: 0.85, brake: 0.12, lateral_g: 0.5, turn: straight, heading_change_deg:  -5}  # Braking zone into T1
  - {id:  3, dist_m:  541, speed_kph:  95, throttle: 0.10, brake: 0.90, lateral_g: 2.2, turn: right,    heading_change_deg: -95}  # T1 (destra, forte frenata)
  - {id:  4, dist_m:  812, speed_kph: 150, throttle: 0.55, brake: 0.18, lateral_g: 3.2, turn: left,     heading_change_deg: +30}  # T2 (sinistra)
  - {id:  5, dist_m: 1082, speed_kph: 175, throttle: 0.70, brake: 0.10, lateral_g: 3.5, turn: right,    heading_change_deg: -35}  # T3 (destra)
  - {id:  6, dist_m: 1353, speed_kph: 130, throttle: 0.20, brake: 0.70, lateral_g: 2.8, turn: right,    heading_change_deg: -75}  # T4 (destra, frenata)
  - {id:  7, dist_m: 1623, speed_kph: 250, throttle: 0.95, brake: 0.00, lateral_g: 2.0, turn: right,    heading_change_deg: -10}  # Allungo verso esse
  - {id:  8, dist_m: 1894, speed_kph: 210, throttle: 0.80, brake: 0.05, lateral_g: 3.8, turn: left,     heading_change_deg: +40}  # T5-6-7 esses (sinistra)
  - {id:  9, dist_m: 2164, speed_kph: 300, throttle: 1.00, brake: 0.00, lateral_g: 0.4, turn: straight, heading_change_deg:   0}  # Back straight (DRS)
  - {id: 10, dist_m: 2435, speed_kph:  85, throttle: 0.10, brake: 0.92, lateral_g: 2.2, turn: right,    heading_change_deg: -60}  # T8 (destra, frenata pesante)
  - {id: 11, dist_m: 2706, speed_kph: 105, throttle: 0.25, brake: 0.55, lateral_g: 2.6, turn: right,    heading_change_deg: -50}  # T9-10 (destra)
  - {id: 12, dist_m: 2976, speed_kph: 160, throttle: 0.60, brake: 0.15, lateral_g: 3.2, turn: left,     heading_change_deg: +25}  # T10 uscita (sinistra)
  - {id: 13, dist_m: 3247, speed_kph: 175, throttle: 0.70, brake: 0.10, lateral_g: 3.5, turn: right,    heading_change_deg: -55}  # T11 (destra)
  - {id: 14, dist_m: 3517, speed_kph: 280, throttle: 1.00, brake: 0.00, lateral_g: 0.5, turn: straight, heading_change_deg:   0}  # Allungo T11-T12
  - {id: 15, dist_m: 3788, speed_kph: 120, throttle: 0.18, brake: 0.78, lateral_g: 2.8, turn: right,    heading_change_deg: -70}  # T13 (destra, frenata)
  - {id: 16, dist_m: 4058, speed_kph: 155, throttle: 0.55, brake: 0.20, lateral_g: 3.2, turn: left,     heading_change_deg: +20}  # T14 (sinistra)
  - {id: 17, dist_m: 4329, speed_kph: 140, throttle: 0.45, brake: 0.30, lateral_g: 3.0, turn: right,    heading_change_deg: -40}  # T14 complesso (destra)
  - {id: 18, dist_m: 4599, speed_kph: 200, throttle: 0.85, brake: 0.05, lateral_g: 2.2, turn: right,    heading_change_deg:   0}  # Uscita verso T15
  - {id: 19, dist_m: 4870, speed_kph: 175, throttle: 0.70, brake: 0.12, lateral_g: 3.3, turn: left,     heading_change_deg: +20}  # T15 (sinistra) onto main straight
  - {id: 20, dist_m: 5141, speed_kph: 290, throttle: 1.00, brake: 0.00, lateral_g: 0.4, turn: straight, heading_change_deg:   0}  # Accelerazione su rettilineo principale
  # Total heading_change_deg = -360° (verified)

# ── Tyre compounds available ─────────────────────────────────
tyres:
  # Pirelli nominates the hardest range at Bahrain due to the abrasive surface.
  # 2024: C1 (Hard), C2 (Medium), C3 (Soft) — labelled as Hard/Medium/Soft.
  available_compounds: ["C1", "C2", "C3"]
  compound_labels: {C1: "Hard", C2: "Medium", C3: "Soft"}

  C1:
    compound: "Hard"
    color_hex: "#FFFFFF"
    delta_s: 1.2
    deg_rate_s_per_lap: 0.075
    wear_limit_laps: 30
    warmup_laps: 4
    optimal_temp_c: 105
    temp_window_c: [90, 120]

  C2:
    compound: "Medium"
    color_hex: "#FFD700"
    delta_s: 0.6
    deg_rate_s_per_lap: 0.115
    wear_limit_laps: 22
    warmup_laps: 3
    optimal_temp_c: 95
    temp_window_c: [80, 110]

  C3:
    compound: "Soft"
    color_hex: "#FF0000"
    delta_s: 0.0
    deg_rate_s_per_lap: 0.175
    wear_limit_laps: 13
    warmup_laps: 2
    optimal_temp_c: 88
    temp_window_c: [74, 104]

# ── Circuit-specific compound overrides (DATA-DRIVEN, ML step 3) ──────
# Degradation overlay set from real FastF1 stints (2019-2024, fuel-corrected,
# robust Theil-Sen fit). Bahrain is the most abrasive circuit: the learned
# degradation (Soft 0.141, Medium 0.116, Hard 0.103 s/lap) exceeds what the
# physics wear model produces alone (~0.07-0.09), so the overlay ADDS the
# remainder (overlay = learned − physics). Much lower than the old hand-tuned
# values (0.140-0.260) which over-degraded by ~3×.
compound_overrides:
  Hard:
    deg_s_per_lap: 0.038    # learned 0.103 − physics 0.066 (was hand-tuned 0.140)
  Medium:
    deg_s_per_lap: 0.043    # learned 0.116 − physics 0.072 (was 0.190)
  Soft:
    deg_s_per_lap: 0.047    # learned 0.141 − physics 0.094 (was 0.260)

# ── Pit stop data ────────────────────────────────────────────
pit_stop:
  pit_lane_delta_s: 23.0
  stationary_time_s: 2.4
  pit_lane_speed_limit_kph: 80
  pit_entry_dist_m: 5200
  unsafe_release_risk: 0.02

# ── Safety car / VSC probabilities (historical Bahrain) ──────
safety_car:
  sc_probability_per_lap: 0.040
  vsc_probability_per_lap: 0.035
  avg_sc_duration_laps: 4

# ── Fuel ────────────────────────────────────────────────────
fuel:
  race_fuel_load_kg: 110
  fuel_effect_s_per_kg: 0.035
  consumption_kg_per_lap: 1.93   # ~110 kg / 57 laps

# ── ERS / Power unit ─────────────────────────────────────────
ers:
  deployment_strategy: "full_straight"
  available_per_lap_mj: 4.0
  typical_deploy_mj: 3.5

# ── Circuit-specific vehicle setup ───────────────────────────
# Overrides the base vehicle parameters in main.py for this circuit.
# Bahrain runs a medium-downforce package: lower than Silverstone
# (long straights) but more wing than Monza (traction zones).
vehicle_setup:
  drag_coefficient: 0.78      # between Monza (0.75) and Silverstone (0.83)
  lift_coefficient: 2.30      # medium downforce
  max_speed: 90.0             # 324 km/h — main straight Vmax with DRS
  fuel_mass: 110.0
  tyre_mu: 1.80               # calibrated vs VER Q pole 89.179 s (sim 89.262 s, gap +0.083 s)
  ers_power_kw: 0
